<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>石山団地 ↔ 石山駅 次のバス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --accent: #c8401a;
    --accent2: #1a5c8a;
    --muted: #8a8070;
    --card-bg: #fffcf5;
    --border: #d4cfc5;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(200,64,26,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(26,92,138,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 480px;
  }

  .stop-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  /* Direction Toggle */
  .direction-toggle {
    width: 100%;
    max-width: 480px;
    display: flex;
    background: var(--ink);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 1.5rem;
    gap: 4px;
  }

  .dir-btn {
    flex: 1;
    border: none;
    border-radius: 9px;
    padding: 0.75rem 0.5rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    background: transparent;
    color: #808080;
    transition: background 0.2s, color 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1.3;
  }

  .dir-btn .arrow {
    font-size: 1rem;
    font-weight: 900;
  }

  .dir-btn.active {
    background: var(--paper);
    color: var(--ink);
  }

  .dir-btn.active .route-label { color: var(--accent); }

  .dir-btn .route-label {
    font-size: 0.62rem;
    font-weight: 400;
    color: #606060;
    letter-spacing: 0.05em;
  }

  /* Clock */
  .clock-block {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 1.2rem 2rem;
    text-align: center;
    width: 100%;
    max-width: 480px;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .clock-block::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 8px,
      rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 16px
    );
  }
  .clock-time {
    font-family: 'DM Mono', monospace;
    font-size: 3rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    line-height: 1;
    position: relative;
  }
  .clock-date {
    font-size: 0.75rem;
    color: #a09888;
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
    position: relative;
  }
  .day-type-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    margin-left: 0.4rem;
    letter-spacing: 0.05em;
    vertical-align: middle;
  }

  /* Next bus card */
  .next-card {
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 480px;
    margin-bottom: 1.2rem;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .next-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .next-card.primary { border-color: var(--accent); box-shadow: 4px 4px 0 var(--accent); }
  .next-card.primary:hover { box-shadow: 6px 6px 0 var(--accent); }

  .card-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  .primary .card-label { color: var(--accent); }

  .card-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .bus-time {
    font-family: 'DM Mono', monospace;
    font-size: 2.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--ink);
  }
  .primary .bus-time { color: var(--accent); }

  .countdown {
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    text-align: right;
  }
  .primary .countdown { color: var(--accent); }
  .countdown span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    order: -1;
  }
  .countdown {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .via-tag {
    margin-top: 0.6rem;
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .via-tag strong { color: var(--ink); font-weight: 700; }
  .via-dot { width: 5px; height: 5px; background: var(--accent2); border-radius: 50%; display: inline-block; }

  /* Following buses */
  .following-title {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 0.6rem;
    max-width: 480px;
    width: 100%;
  }

  .following-list {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .following-item {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .f-time { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; color: var(--ink); }
  .f-info { text-align: right; font-size: 0.72rem; color: var(--muted); }
  .f-info strong { color: var(--ink); display: block; font-size: 0.78rem; }

  .no-bus {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  footer {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.8;
    max-width: 480px;
  }
  footer a { color: var(--accent2); text-decoration: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #2ecc71;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 1.5s ease-in-out infinite;
    vertical-align: middle;
  }

  /* Full timetable toggle */
  .toggle-btn {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .toggle-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .toggle-btn .chevron {
    display: inline-block;
    transition: transform 0.25s ease;
    font-size: 0.9rem;
  }
  .toggle-btn.open .chevron { transform: rotate(180deg); }

  .full-timetable {
    width: 100%;
    max-width: 480px;
    display: none;
    flex-direction: column;
    gap: 0;
    margin-bottom: 1.5rem;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .full-timetable.open { display: flex; }

  .tt-hour-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
  }
  .tt-hour-row:last-child { border-bottom: none; }
  .tt-hour {
    width: 2.8rem;
    min-width: 2.8rem;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.04em;
  }
  .tt-buses {
    flex: 1;
    padding: 0.45rem 0.6rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 0.5rem;
    align-items: center;
  }
  .tt-bus {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
  }
  .tt-bus .tt-via {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.55rem;
    color: var(--muted);
    margin-left: 1px;
    vertical-align: super;
  }
  .tt-bus.past { color: var(--border); }
  .tt-bus.next-up { color: var(--accent); font-weight: 700; }

  /* Day-type tabs */
  .tt-tabs {
    width: 100%;
    max-width: 480px;
    display: none;
    gap: 4px;
    margin-bottom: 0.5rem;
  }
  .tt-tabs.open { display: flex; }
  .tt-tab {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.3rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: var(--card-bg);
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tt-tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slideIn 0.25s ease both; }
</style>
</head>
<body>

<header>
  <p class="stop-label">江若交通 停留所時刻表</p>
  <h1>石山団地 ↔ 石山駅</h1>
</header>

<!-- Direction Toggle -->
<div class="direction-toggle">
  <button class="dir-btn active" id="btnToEki" onclick="setDir('toEki')">
    <span class="arrow">→</span>
    <span>石山団地 発</span>
    <span class="route-label">石山駅ゆき</span>
  </button>
  <button class="dir-btn" id="btnToD" onclick="setDir('toDanchi')">
    <span class="arrow">←</span>
    <span>石山駅 発</span>
    <span class="route-label">石山団地ゆき</span>
  </button>
</div>

<!-- Clock -->
<div class="clock-block">
  <div class="clock-time" id="clock">--:--:--</div>
  <div class="clock-date" id="dateLabel">---</div>
</div>

<div id="nextBusArea" style="width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;"></div>
<p class="following-title"><span class="live-dot"></span>その後のバス</p>
<div class="following-list" id="followingList"></div>
<button class="toggle-btn" id="toggleBtn" onclick="toggleFull()">
  <span class="chevron">▼</span>
  <span id="toggleLabel">本日の時刻表をすべて表示</span>
</button>
<div class="tt-tabs" id="ttTabs">
  <button class="tt-tab" id="tab-weekday" onclick="setTtDay('weekday')">平日</button>
  <button class="tt-tab" id="tab-saturday" onclick="setTtDay('saturday')">土曜</button>
  <button class="tt-tab" id="tab-holiday" onclick="setTtDay('holiday')">休日</button>
</div>
<div class="full-timetable" id="fullTimetable"></div>
<footer id="footerNote"></footer>

// =====================================================
// 石山駅 → 石山団地(1番) 時刻表
// 出典: 松原(1番)停留所【1】【33】石山団地行き時刻の2分前
// https://www.kojak.co.jp/timetable/Zikoku/00951_01/
// =====================================================
function m2(h, m) {
  let t = h * 60 + m - 2;
  if (t < 0) t += 1440;
  return { h: Math.floor(t / 60), m: t % 60 };
}
function b(h, m, via) { const t = m2(h, m); return { h: t.h, m: t.m, via }; }

const toDanchi = {
  weekday: [
    b(6,56,'石山寺経由'),
    b(7,34,'石山寺経由'),
    b(8,8,'石山寺経由'), b(8,45,'石山寺経由'),
    b(9,2,'国分団地経由'), b(9,25,'石山寺経由'),
    b(10,2,'国分団地経由'), b(10,5,'石山寺経由'), b(10,45,'石山寺経由'),
    b(11,2,'国分団地経由'), b(11,25,'石山寺経由'),

// Sort
[toEki, toDanchi].forEach(tt => {
  Object.keys(tt).forEach(k => tt[k].sort((a,b) => (a.h*60+a.m)-(b.h*60+b.m)));
});

const WEEKDAYS = ['日','月','火','水','木','金','土'];
let currentDir = 'toEki';

function setDir(dir) {
  currentDir = dir;
  document.getElementById('btnToEki').classList.toggle('active', dir === 'toEki');
  document.getElementById('btnToD').classList.toggle('active', dir === 'toDanchi');
  render();
}

function getDayType(d) {
  const dow = d.getDay();
  if (dow === 0) return 'holiday';
  if (dow === 6) return 'saturday';
  return 'weekday';
}

function getDayLabel(t) {
  return {weekday:'平日', saturday:'土曜', holiday:'休日'}[t];
}

function pad(n) { return String(n).padStart(2,'0'); }

function formatCountdown(diffMin) {
  if (diffMin < 1) return 'まもなく';
  if (diffMin < 60) return `${diffMin}分後`;
  const h = Math.floor(diffMin/60), m = diffMin % 60;
  return m > 0 ? `${h}時間${m}分後` : `${h}時間後`;
}

function render() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const nowMin = h * 60 + m;

  document.getElementById('clock').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

  const dow = now.getDay();
  const dayType = getDayType(now);
  document.getElementById('dateLabel').innerHTML =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[dow]}）<span class="day-type-badge">${getDayLabel(dayType)}ダイヤ</span>`;

  const data = currentDir === 'toEki' ? toEki : toDanchi;
  const buses = data[dayType];
  const upcoming = buses.filter(b => b.h*60+b.m >= nowMin);

  const destName = currentDir === 'toEki' ? '石山駅' : '石山団地';
  const srcName  = currentDir === 'toEki' ? '石山団地' : '石山駅';

  const nextBusArea = document.getElementById('nextBusArea');
  const followingList = document.getElementById('followingList');
  const footerNote = document.getElementById('footerNote');

  const upcomingKey = upcoming.length === 0 ? 'none' : upcoming.slice(0,5).map(b=>b.h*60+b.m+b.via).join(',');
  const dirKey = currentDir + upcomingKey;

  // Update countdown text every second without full re-render
  if (nextBusArea.dataset.key === dirKey) {
    if (upcoming.length > 0) {
      const cdEl = nextBusArea.querySelector('.countdown');
      if (cdEl) cdEl.childNodes[1].textContent = formatCountdown(upcoming[0].h*60+upcoming[0].m - nowMin);
    }
    return;
  }
  nextBusArea.dataset.key = dirKey;

  nextBusArea.innerHTML = '';
  followingList.innerHTML = '';

  if (upcoming.length === 0) {
    nextBusArea.innerHTML = `<div class="no-bus" style="width:100%">本日の運行は終了しました</div>`;
  } else {
    const next = upcoming[0];
    const diffNext = next.h*60+next.m - nowMin;
    const card = document.createElement('div');
    card.className = 'next-card primary slide-in';
    card.innerHTML = `
      <div class="card-label">次のバス（${srcName}発）</div>
      <div class="card-row">
        <div class="bus-time">${pad(next.h)}:${pad(next.m)}</div>
        <div class="countdown"><span>出発まで</span>${formatCountdown(diffNext)}</div>
      </div>
      <div class="via-tag"><span class="via-dot"></span><strong>${next.via}</strong>→ ${destName}${next.direct?' (直行)':''}</div>
    `;
    nextBusArea.appendChild(card);

    upcoming.slice(1, 5).forEach(b => {
      const diff = b.h*60+b.m - nowMin;
      const item = document.createElement('div');
      item.className = 'following-item slide-in';
      item.innerHTML = `
        <div class="f-time">${pad(b.h)}:${pad(b.m)}</div>
        <div class="f-info"><strong>${formatCountdown(diff)}</strong>${b.via}${b.direct?' (直行)':''}</div>
      `;
      followingList.appendChild(item);
    });
  }

  if (currentDir === 'toEki') {
    footerNote.innerHTML = `
      ※「直」＝東レ正門前・国分団地経由 石山駅ゆき直行<br>
      ※8月13日・12月29日（休日除く）は土曜ダイヤ。お盆(8/14〜16)・年末年始(12/30〜1/4)は休日ダイヤ<br><br>
      出典: <a href="https://www.kojak.co.jp/timetable/Zikoku/01058_01/" target="_blank">江若交通公式時刻表（石山団地1番）</a>
    `;
  } else {
    footerNote.innerHTML = `
      ※時刻は松原バス停（石山団地方面）の公式時刻から2分前を石山駅発として表示<br>
      ※8月13日・12月29日（休日除く）は土曜ダイヤ。お盆(8/14〜16)・年末年始(12/30〜1/4)は休日ダイヤ<br><br>
      出典: <a href="https://www.kojak.co.jp/timetable/Zikoku/00951_01/" target="_blank">江若交通 松原(1番)時刻表</a>
    `;
  }
}

let fullOpen = false;
let ttDayType = null;

function toggleFull() {
  fullOpen = !fullOpen;
  const btn = document.getElementById('toggleBtn');
  const box = document.getElementById('fullTimetable');
  const tabs = document.getElementById('ttTabs');
  const lbl = document.getElementById('toggleLabel');
  btn.classList.toggle('open', fullOpen);
  box.classList.toggle('open', fullOpen);
  tabs.classList.toggle('open', fullOpen);
  lbl.textContent = fullOpen ? '時刻表を閉じる' : '本日の時刻表をすべて表示';
  if (fullOpen) {
    // default to today's day type
    ttDayType = getDayType(new Date());
    updateTtTabs();
    renderFullTimetable();
  }
}

function setTtDay(type) {
  ttDayType = type;
  updateTtTabs();
  renderFullTimetable();
}

function updateTtTabs() {
  ['weekday','saturday','holiday'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === ttDayType);
  });
}

function renderFullTimetable() {
  const now = new Date();
  const todayType = getDayType(now);
  const nowMin = (ttDayType === todayType) ? now.getHours() * 60 + now.getMinutes() : -1;

  const data = currentDir === 'toEki' ? toEki : toDanchi;
  const buses = data[ttDayType];
  const upcoming = buses.filter(x => x.h*60+x.m >= nowMin);

  const byHour = {};
  buses.forEach(b => {
    if (!byHour[b.h]) byHour[b.h] = [];
    byHour[b.h].push(b);
  });

  const box = document.getElementById('fullTimetable');
  box.innerHTML = '';
  Object.keys(byHour).sort((a,b) => +a - +b).forEach(h => {
    const row = document.createElement('div');
    row.className = 'tt-hour-row';
    const busesCell = document.createElement('div');
    busesCell.className = 'tt-buses';
    row.innerHTML = `<div class="tt-hour">${pad(+h)}</div>`;
    row.appendChild(busesCell);
    box.appendChild(row);

    byHour[h].forEach(bus => {
      const bMin = bus.h * 60 + bus.m;
      const span = document.createElement('span');
      const isNext = upcoming.length > 0 && upcoming[0].h === bus.h && upcoming[0].m === bus.m && upcoming[0].via === bus.via;
      span.className = 'tt-bus' + (isNext ? ' next-up' : bMin < nowMin ? ' past' : '');
      const viaShort = bus.via === '石山寺経由' ? '寺' : '国';
      span.innerHTML = `${pad(bus.m)}<span class="tt-via">${viaShort}</span>`;
      span.title = `${pad(bus.h)}:${pad(bus.m)} ${bus.via}`;
      busesCell.appendChild(span);
    });
  });
}

render();
setInterval(() => {
  render();
  if (fullOpen) renderFullTimetable();
}, 1000);
</script>
